<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #000;
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(circle at center, #1a1a1a, #000);
}

.hero h1 {
  font-size: 42px;
  font-weight: 800;
  max-width: 800px;
  background: linear-gradient(90deg, #d4af37, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  margin: 20px 0;
  opacity: 0.8;
}

/* BOTÃO DOURADO */
.btn {
  background: linear-gradient(90deg, #d4af37, #ffd700);
  color: #000;
  padding: 15px 35px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  border-radius: 6px;
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
}

/* VIDEO */
.video {
  padding: 80px 20px;
  text-align: center;
}

.video iframe {
  width: 100%;
  max-width: 800px;
  height: 450px;
  border-radius: 10px;
  border: 2px solid #d4af37;
}

/* SEÇÕES */
.section {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  width: 260px;
  background: #111;
  padding: 25px;
  border-radius: 12px;
  border: 1px solid #d4af37;
  transform: translateY(40px);
  opacity: 0;
  transition: 0.6s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 15px rgba(212,175,55,0.3);
}

/* CTA FIXO */
.cta-fixed {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(90deg, #d4af37, #ffd700);
  color: #000;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  z-index: 999;
}

/* ANIMAÇÃO */
.show {
  transform: translateY(0);
  opacity: 1;
}
</style>
